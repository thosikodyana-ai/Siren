name = "siren"
main = "build/worker/shim.mjs"
compatibility_date = "2026-03-04"
minify = false

[[kv_namespaces]]
binding = "SIREN"
id = "2de3e2feb61f470191306c8b9b7bfc5c"

[build]
# Hapus 'cargo install', cukup panggil command build-nya saja
command = "worker-build --release"

[env.dev]
build = { command = "worker-build --dev" }

[vars]
UUID = "f282b878-8711-45a1-8c69-5564172123c1"
MAIN_PAGE_URL = "https://raw.githubusercontent.com/FoolVPN-ID/Siren/refs/heads/master/web/index.html"
SUB_PAGE_URL = "https://raw.githubusercontent.com/FoolVPN-ID/Siren/refs/heads/master/web/sub.html"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
