name: cf workers

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - 'README.md'
      - 'LICENSE.md'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: cf
    steps:
      - uses: actions/checkout@v4

      # 1. Setup Rust agar lingkungan Ubuntu siap untuk kompilasi WASM
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      # 2. Caching supaya tidak download & compile worker-build setiap kali push
      - name: Cache worker-build
        id: cache-worker-build
        uses: actions/cache@v3
        with:
          path: ~/.cargo/bin/worker-build
          key: ${{ runner.os }}-worker-build-0.7.5

      # 3. Instal worker-build HANYA jika belum ada di cache
      - name: Install worker-build
        if: steps.cache-worker-build.outputs.cache-hit != 'true'
        run: cargo install worker-build@0.7.5

      # 4. Baru jalankan deploy
      - name: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: '4.70.0'
