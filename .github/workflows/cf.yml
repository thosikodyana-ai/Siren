name: cf workers

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - 'README.md'
      - 'LICENSE.md'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: cf
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache worker-build
        id: cache-worker-build
        uses: actions/cache@v3
        with:
          path: ~/.cargo/bin/worker-build
          key: ${{ runner.os }}-worker-build-0.7.5

      - name: Install worker-build
        if: steps.cache-worker-build.outputs.cache-hit != 'true'
        run: cargo install worker-build@0.7.5

      - name: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Kita pakai versi 3 yang stabil tapi biarkan dia update sendiri
          wranglerVersion: '3.107.3'
